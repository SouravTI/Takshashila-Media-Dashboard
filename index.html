<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotdog?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    #app { max-width: 400px; width: 100%; background: #fff; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1rem; }
    #camera-view { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 12px; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }
    #snap-result { width: 100%; height: 100%; object-fit: cover; display: none; }
    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; padding-bottom: 1.5rem;
      background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 40%);
    }
    #snap-btn {
      width: 68px; height: 68px; border-radius: 50%; background: #fff;
      border: 4px solid rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    #snap-btn:active { transform: scale(0.92); }
    #snap-btn-inner { width: 52px; height: 52px; border-radius: 50%; background: #fff; border: 2px solid #ccc; }
    #flip-btn {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.5); color: #fff; border: none;
      border-radius: 50%; width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #retake-btn {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.5); color: #fff; border: none;
      border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; display: none;
    }
    #loading-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; display: inline-block; margin: 0 3px; animation: blink 1.2s infinite both; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }
    #result-panel { display: none; margin-top: 1rem; border-radius: 12px; padding: 1.25rem; text-align: center; }
    #result-panel.hotdog { background: #FAEEDA; border: 1px solid #FAC775; }
    #result-panel.not-hotdog { background: #FCEBEB; border: 1px solid #F7C1C1; }
    #verdict-text { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    #verdict-text.hotdog { color: #633806; }
    #verdict-text.not-hotdog { color: #501313; }
    #reason-text { font-size: 14px; line-height: 1.6; }
    #reason-text.hotdog { color: #854F0B; }
    #reason-text.not-hotdog { color: #791F1F; }
    #no-camera { display: none; text-align: center; padding: 3rem 1rem; color: #888; }
  </style>
</head>
<body>
<div id="app">
  <h1>Hotdog?</h1>
  <p class="subtitle">Point camera at food. Get truth.</p>

  <div id="camera-view">
    <video id="video" autoplay playsinline muted></video>
    <img id="snap-result" alt="captured">
    <canvas id="canvas"></canvas>

    <div id="overlay">
      <div id="snap-btn" onclick="snap()">
        <div id="snap-btn-inner"></div>
      </div>
    </div>

    <button id="flip-btn" onclick="flipCamera()">⟳</button>
    <button id="retake-btn" onclick="retake()">✕ Retake</button>

    <div id="loading-overlay">
      <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <span style="color:#fff; font-size:13px;">Analyzing...</span>
    </div>
  </div>

  <div id="no-camera">
    <p style="font-size:32px; margin-bottom:8px;">📷</p>
    <p style="font-weight:600; margin-bottom:4px;">Camera not available</p>
    <p style="font-size:13px;">Please allow camera access and reload.</p>
  </div>

  <div id="result-panel">
    <p id="verdict-text"></p>
    <p id="reason-text"></p>
  </div>
</div>

<script>
  // ⚠️ Add your Anthropic API key here.
  // For production, NEVER expose API keys in frontend code.
  // Use a backend proxy instead.
  const API_KEY = 'YOUR_ANTHROPIC_API_KEY';

  let stream = null;
  let facingMode = 'environment';

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const snapResult = document.getElementById('snap-result');
  const overlay = document.getElementById('overlay');
  const retakeBtn = document.getElementById('retake-btn');
  const flipBtn = document.getElementById('flip-btn');
  const loadingOverlay = document.getElementById('loading-overlay');
  const resultPanel = document.getElementById('result-panel');
  const verdictText = document.getElementById('verdict-text');
  const reasonText = document.getElementById('reason-text');
  const noCam = document.getElementById('no-camera');
  const cameraView = document.getElementById('camera-view');

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 720 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      cameraView.style.display = 'block';
      noCam.style.display = 'none';
    } catch (e) {
      cameraView.style.display = 'none';
      noCam.style.display = 'block';
    }
  }

  async function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  }

  function snap() {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 640;
    canvas.getContext('2d').drawImage(video, 0, 0);

    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    snapResult.src = dataUrl;
    snapResult.style.display = 'block';
    video.style.display = 'none';
    overlay.style.display = 'none';
    flipBtn.style.display = 'none';
    retakeBtn.style.display = 'block';
    resultPanel.style.display = 'none';

    analyze(dataUrl.split(',')[1]);
  }

  function retake() {
    snapResult.style.display = 'none';
    video.style.display = 'block';
    overlay.style.display = 'flex';
    flipBtn.style.display = 'flex';
    retakeBtn.style.display = 'none';
    resultPanel.style.display = 'none';
    loadingOverlay.style.display = 'none';
  }

  async function analyze(b64) {
    loadingOverlay.style.display = 'flex';
    resultPanel.style.display = 'none';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `You are the Hotdog Detector. Your sole purpose: determine if an image contains a hotdog.
A hotdog = cooked sausage served in a bun/roll. Corn dogs count. Bare sausage without bun = not hotdog.
Respond ONLY in raw JSON, no markdown fences, no preamble.
Format: {"verdict":"hotdog" or "not hotdog","reason":"one short witty sentence"}`,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
              { type: 'text', text: 'Hotdog or not hotdog?' }
            ]
          }]
        })
      });

      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('');
      const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
      const isHotdog = parsed.verdict === 'hotdog';

      loadingOverlay.style.display = 'none';
      resultPanel.style.display = 'block';
      resultPanel.className = isHotdog ? 'hotdog' : 'not-hotdog';
      verdictText.className = isHotdog ? 'hotdog' : 'not-hotdog';
      reasonText.className = isHotdog ? 'hotdog' : 'not-hotdog';
      verdictText.textContent = isHotdog ? '🌭 Hotdog!' : '🚫 Not hotdog';
      reasonText.textContent = parsed.reason;
    } catch (e) {
      loadingOverlay.style.display = 'none';
      resultPanel.style.display = 'block';
      resultPanel.className = 'not-hotdog';
      verdictText.className = 'not-hotdog';
      verdictText.textContent = 'Error';
      reasonText.textContent = 'Could not analyze. Try again.';
    }
  }

  startCamera();
</script>
</body>
</html>
